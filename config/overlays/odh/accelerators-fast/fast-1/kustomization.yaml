    apiVersion: serving.kserve.io/v1alpha2
    kind: LLMInferenceServiceConfig
    metadata:
      name: kserve-config-llm-template-amd-rocm
      annotations:
        opendatahub.io/config-base-name: kserve-config-llm-template-amd-rocm-fast-1
