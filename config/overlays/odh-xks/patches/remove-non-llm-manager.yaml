# Remove kserve-controller-manager Deployment
$patch: delete
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kserve-controller-manager
  namespace: opendatahub
---
$patch: delete
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kserve-controller-manager
  namespace: opendatahub
---
# Remove RoleBinding for leader election
$patch: delete
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kserve-leader-election-rolebinding
  namespace: opendatahub
---
# Remove ClusterRoleBindings
$patch: delete
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kserve-manager-rolebinding
---
$patch: delete
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kserve-proxy-rolebinding