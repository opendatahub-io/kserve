# This is the RHAII CA certificate.
# It is issued by the selfsigned ClusterIssuer and used to sign workload certificates.
# The secret created (rhaii-ca) contains tls.crt and tls.key.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rhaii-ca
  namespace: cert-manager
spec:
  secretName: rhaii-ca
  isCA: true
  commonName: rhaii-ca
  duration: 87600h  # 10 years
  renewBefore: 2160h  # 90 days
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: rhaii-selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
