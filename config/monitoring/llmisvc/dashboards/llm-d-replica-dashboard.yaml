apiVersion: perses.dev/v1alpha2
kind: PersesDashboard
metadata:
  name: dashboard-3-llm-d-replica-admin
spec:
  config:
    display:
      name: LLM Replica Detail
    duration: 1h
    variables:
    - kind: ListVariable
      spec:
        name: namespace
        display:
          name: Project
          description: Filter by project
        allowMultiple: true
        allowAllValue: true
        customAllValue: .*
        defaultValue: $__all
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            datasource:
              kind: PrometheusDatasource
              name: data-science-prometheus-datasource
            labelName: namespace
            matchers:
            - kserve_vllm:num_requests_running
    - kind: ListVariable
      spec:
        name: model_name
        display:
          name: Model
          description: Filter by model
        allowMultiple: true
        allowAllValue: true
        customAllValue: .*
        defaultValue: $__all
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            datasource:
              kind: PrometheusDatasource
              name: data-science-prometheus-datasource
            labelName: model_name
            matchers:
            - kserve_vllm:num_requests_running{namespace=~"$namespace"}
    panels:
      gpuUtilization:
        kind: Panel
        spec:
          display:
            name: GPU utilization
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: percent
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: avg by (pod) (accelerator_gpu_utilization{exported_namespace=~"$namespace"})
                  seriesNameFormat: '{{pod}}'
      queueDepthRunning:
        kind: Panel
        spec:
          display:
            name: Requests running
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: decimal
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: sum by (pod) (kserve_vllm:num_requests_running{namespace=~"$namespace"})
                  seriesNameFormat: '{{pod}}'
      queueDepthWaiting:
        kind: Panel
        spec:
          display:
            name: Requests waiting
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: decimal
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: data-science-prometheus-datasource
                  query: sum by (pod) (kserve_vllm:num_requests_waiting{namespace=~"$namespace"})
                  seriesNameFormat: '{{pod}}'
    layouts:
    - kind: Grid
      spec:
        display:
          title: GPU utilization
          collapse:
            open: true
        items:
        - x: 0
          y: 0
          width: 24
          height: 8
          content:
            $ref: '#/spec/panels/gpuUtilization'
    - kind: Grid
      spec:
        display:
          title: Queue depth
          collapse:
            open: true
        items:
        - x: 0
          y: 0
          width: 12
          height: 8
          content:
            $ref: '#/spec/panels/queueDepthRunning'
        - x: 12
          y: 0
          width: 12
          height: 8
          content:
            $ref: '#/spec/panels/queueDepthWaiting'
