name: xKS E2E Tests (KinD odh-xks)

on:
  pull_request:
    branches: [master, release*]
    paths:
      - "**"
      - "!.github/**"
      - "!docs/**"
      - "!**.md"
      - "e2e-test-odh-xks-kind.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-odh-xks-kind:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        istio-version: ["1.27.5", "1.28.3"]
        deploy-method: ["kustomize", "helm"]
    name: test-odh-xks-kind (istio-${{ matrix.istio-version }}, ${{ matrix.deploy-method }})
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge target branch
        run: |
          git fetch origin ${{ github.base_ref }}
          git merge origin/${{ github.base_ref }} --no-edit

      - name: Free-up disk space
        uses: ./.github/actions/free-up-disk-space

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install KinD
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl"
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Install kustomize
        run: |
          curl -LO "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.7.1/kustomize_v5.7.1_linux_amd64.tar.gz"
          tar xzf kustomize_v5.7.1_linux_amd64.tar.gz
          chmod +x kustomize
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Install Helm
        if: matrix.deploy-method == 'helm'
        uses: azure/setup-helm@v4

      - name: Install cloud-provider-kind
        run: |
          go install sigs.k8s.io/cloud-provider-kind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Start cloud-provider-kind
        run: |
          # Start in background before cluster creation
          nohup cloud-provider-kind > /tmp/cloud-provider-kind.log 2>&1 &
          echo "cloud-provider-kind started in background (PID: $!)"

      - name: Run setup-odh-xks.sh (kustomize)
        if: matrix.deploy-method == 'kustomize'
        env:
          ISTIO_VERSION: ${{ matrix.istio-version }}
        run: |
          # Script creates KinD cluster, installs deps, builds & loads controller, deploys overlay
          ./test/scripts/kind/setup-odh-xks.sh

      - name: Run setup-odh-xks.sh (helm - cluster setup only)
        if: matrix.deploy-method == 'helm'
        env:
          ISTIO_VERSION: ${{ matrix.istio-version }}
          SKIP_KSERVE_DEPLOY: "true"
        run: |
          # Script creates KinD cluster, installs deps, builds & loads controller
          # Skip kserve deployment - will deploy via helm
          ./test/scripts/kind/setup-odh-xks.sh

      - name: Clone chart repository
        if: matrix.deploy-method == 'helm'
        uses: actions/checkout@v4
        with:
          repository: pierDipi/rhaii-xks-kserve
          path: rhaii-xks-kserve

      - name: Generate and deploy Helm chart
        if: matrix.deploy-method == 'helm'
        env:
          KSERVE_CONTROLLER_IMAGE: kserve-controller:dev
        run: |
          # Generate chart with original images (skip registry.redhat.io replacement)
          ./rhaii-xks-kserve/generate-chart.sh \
            --overlay ./config/overlays/odh-xks \
            --skip-image-replacement

          # Deploy via Helm
          helm install kserve-xks ./rhaii-xks-kserve \
            --namespace opendatahub \
            --wait \
            --timeout 5m

          # Patch deployment to use local controller image (built by setup-odh-xks.sh)
          kubectl set image deployment/kserve-controller-manager \
            manager="${KSERVE_CONTROLLER_IMAGE}" \
            -n opendatahub

          kubectl patch deployment kserve-controller-manager \
            -n opendatahub \
            --type=json \
            -p='[{"op": "replace", "path": "/spec/template/spec/containers/0/imagePullPolicy", "value": "Never"}]'

          # Restart to pick up new image
          kubectl rollout restart deployment/kserve-controller-manager -n opendatahub

          # Wait for controller to be ready
          kubectl rollout status deployment/kserve-controller-manager -n opendatahub --timeout=300s

      - name: Install Poetry and version plugin
        run: ./test/scripts/gh-actions/setup-poetry.sh

      - name: Install Python test dependencies
        run: |
          cd python/kserve
          poetry install --with=test
          cd -

      - name: Run E2E tests
        timeout-minutes: 40
        env:
          SKIP_DELETION_ON_FAILURE: "true"
          TOKEN_AUDIENCES: "https://kubernetes.default.svc"
          GATEWAY_CLASS_NAME: "istio"
        run: |
          source python/kserve/.venv/bin/activate
          cd test/e2e

          # Run llmisvc tests for CPU, skipping auth tests
          pytest llmisvc/ --capture=tee-sys \
            -m "llminferenceservice and cluster_cpu and not auth and not custom_gateway" \
            --ignore=qpext \
            --log-cli-level=INFO \
            -n 1 \
            --dist worksteal \
            --network-layer istio-gatewayapi-ext \
            --maxfail=1

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== KServe Controller logs ==="
          kubectl logs -n opendatahub -l control-plane=kserve-controller-manager --tail=500 2>/dev/null || echo "No controller logs"
          echo ""
          echo "=== Istio logs ==="
          kubectl logs -n istio-system -l app=istiod --tail=200 2>/dev/null || echo "No istiod logs"
          echo ""
          echo "=== Gateway pod logs ==="
          kubectl logs -n opendatahub -l gateway.networking.k8s.io/gateway-name=inference-gateway --tail=200 2>/dev/null || echo "No gateway logs"
          echo ""
          echo "=== cloud-provider-kind logs ==="
          cat /tmp/cloud-provider-kind.log 2>/dev/null || echo "No cloud-provider-kind logs"
          echo ""
          echo "=== Helm release status ==="
          helm list -A 2>/dev/null || echo "Helm not available"