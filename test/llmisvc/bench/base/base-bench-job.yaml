apiVersion: batch/v1
kind: Job
metadata:
  name: guidellm
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: guidellm
      containers:
        - name: guidellm
          image: ghcr.io/vllm-project/guidellm:latest
          env:
            - name: MODEL
              value: "TBD"
            - name: BASE_URL
              value: "TBD"
            - name: PROFILE
              value: "sweep"
            - name: MAX_SECONDS
              value: "300"
            - name: DATA
              value: "prompt_tokens=256,output_tokens=128"
            - name: HOME
              value: "/home/guidellm"
          command: ["/bin/sh", "-c"]
          args:
            - |
              export OPENAI_API_KEY=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)

              echo "--- Waiting for model endpoint to be ready ---"
              until curl -sf -o /dev/null -H "Authorization: Bearer ${OPENAI_API_KEY}" "${BASE_URL}/v1/models"; do
                echo "Model endpoint not ready, retrying in 10s..."
                sleep 10
              done
              echo "--- Model endpoint is ready ---"

              set -e
              echo "Model: ${MODEL}"
              echo "Target: ${BASE_URL}"
              echo "Profile: ${PROFILE}"

              guidellm benchmark \
                --target "${BASE_URL}/v1" \
                --model "${MODEL}" \
                --request-type chat_completions \
                --profile "${PROFILE}" \
                --max-seconds "${MAX_SECONDS}" \
                --data "${DATA}"

              echo "--- guidellm benchmark finished ---"
          resources:
            requests:
              cpu: "2"
              memory: "512Mi"
      restartPolicy: Never